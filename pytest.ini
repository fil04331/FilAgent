# NOTE: This file is maintained for backward compatibility.
# Pytest configuration has been moved to pyproject.toml (PEP 621 standard).
# Consider migrating to pyproject.toml for a unified configuration.

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Options
addopts =
    -v
    --strict-markers
    --strict-config
    --tb=short
    --color=yes
    --cov=runtime
    --cov=planner
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml

# Asyncio mode
asyncio_mode = auto

# Marqueurs
markers =
    slow: tests lents (long-running tests)
    integration: tests d'intégration (integration tests)
    unit: tests unitaires (unit tests)
    memory: tests de mémoire (memory tests)
    tools: tests d'outils (tool tests)
    compliance: tests de conformité Loi 25, RGPD (compliance tests)
    e2e: tests end-to-end (end-to-end tests)
    fixtures: tests validating fixture functionality
    benchmark: performance benchmark tests
    security: security-related tests
